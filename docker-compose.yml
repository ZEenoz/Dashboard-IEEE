services:
  # --- 📂 DATABASE ---
  postgres:
    image: postgres:15
    container_name: postgres_db
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Waterretention1
      TZ: Asia/Bangkok
      POSTGRES_DB: water_monitoring
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # --- 🚀 DASHBOARD BACKEND ---
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dashboard_backend
    restart: unless-stopped
    ports:
      - "4000:4000"
    depends_on:
      - postgres
    env_file:
      - ./backend/.env
    # เมาท์ไฟล์ JSON ของ Google Sheet เข้าไปใช้งาน
    volumes:
      - ./backend/service-account.json:/app/service-account.json

  # --- 🤖 LINE BOT (FLASK) ---
  line-bot:
    build:
      context: ./line-bot
      dockerfile: Dockerfile
    container_name: line_bot
    restart: unless-stopped
    ports:
      - "5000:5000"
    depends_on:
      - postgres
    env_file:
      - ./line-bot/.env

  # --- 🛡️ NGINX REVERSE PROXY (SINGLE ENTRY) ---
  nginx-proxy:
    image: nginx:alpine
    container_name: nginx_proxy
    restart: unless-stopped
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8888:80"
    depends_on:
      - backend
      - line-bot

volumes:
  postgres_data:
