events {
    worker_connections 1024;
}

http {
    # --- การตั้งค่าการเชื่อมต่อ ---
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    server {
        listen 80;

        # 1. เส้นทางของ LINE Bot (พอร์ต 5000) - ให้สิทธิ์สูงกว่า /api/ ปกติ
        location /register { proxy_pass http://line-bot:5000; }
        location /callback { proxy_pass http://line-bot:5000; }
        location /broadcast { proxy_pass http://line-bot:5000; }
        location /push-alert { proxy_pass http://line-bot:5000; }
        location /admin { proxy_pass http://line-bot:5000; }
        
        # API ของ LINE Bot
        location /api/register { proxy_pass http://line-bot:5000; }
        location /api/stats { proxy_pass http://line-bot:5000; }
        location /api/messages { proxy_pass http://line-bot:5000; }
        location /api/outbound-logs { proxy_pass http://line-bot:5000; }
        location /api/stations { proxy_pass http://line-bot:5000; }

        # 2. เส้นทางของ Dashboard Backend (พอร์ต 4000)
        # จัดการ /api/settings, /api/readings, /api/system-health ฯลฯ
        location /api/ {
            proxy_pass http://backend:4000;
        }

        # 3. หน้าแรก (Root) - ให้ไปที่ระบบ LINE Bot (เผื่อเรียกหน้า Register)
        location / {
            proxy_pass http://line-bot:5000;
        }
    }
}
